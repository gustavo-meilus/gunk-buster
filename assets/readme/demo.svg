<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">Gunk Radar terminal example</title>
  <desc id="desc">Gunk Radar finds a package-manager contradiction in CLAUDE.md, labels it BAIT, and proposes changing npm install to pnpm install.</desc>
  <rect width="1080" height="520" rx="24" fill="#031326"/>
  <rect width="1080" height="54" rx="24" fill="#0b2f39"/>
  <rect y="30" width="1080" height="24" fill="#0b2f39"/>
  <circle cx="32" cy="27" r="8" fill="#ff5b4d"/><circle cx="58" cy="27" r="8" fill="#f5c84c"/><circle cx="84" cy="27" r="8" fill="#62c9a8"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23">
    <text x="34" y="103" fill="#62c9a8">$</text><text x="60" y="103" fill="#f6fffb">gunk radar</text>
    <text x="34" y="155" fill="#ff7a6f" font-weight="700">BAIT</text><text x="105" y="155" fill="#f6fffb">CLAUDE.md:3</text>
    <text x="62" y="200" fill="#9dbdb5">claim</text><text x="190" y="200" fill="#ff9b92">npm install</text>
    <text x="62" y="242" fill="#9dbdb5">repo fact</text><text x="190" y="242" fill="#8be0c4">packageManager: pnpm@9.1.0</text>
    <text x="62" y="284" fill="#9dbdb5">evidence</text><text x="190" y="284" fill="#f6fffb">CERTAIN · package-manager drift</text>
    <text x="62" y="326" fill="#9dbdb5">proposed</text><text x="190" y="326" fill="#f6fffb">npm install</text><text x="340" y="326" fill="#ff7a6f">→</text><text x="380" y="326" fill="#8be0c4">pnpm install</text>
    <text x="34" y="398" fill="#62c9a8">✓</text><text x="70" y="398" fill="#f6fffb">Radar complete · 3 findings · no docs edited</text>
    <text x="34" y="454" fill="#7fa69d">Agents may recommend. The CLI decides. The Chief approves.</text>
  </g>
</svg>
